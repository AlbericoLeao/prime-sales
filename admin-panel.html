<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prime Sales Admin">
<title>Prime Sales - Administrador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#F5A800;--gold-dark:#c98a00;--gold-light:rgba(245,168,0,0.12);
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;--bg5:#333;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --red:#e03e3e;--red-bg:rgba(224,62,62,0.12);
  --green:#4caf7d;--green-bg:rgba(76,175,125,0.12);
  --r:12px;--r2:8px;--r3:16px;
  --shadow:0 1px 3px rgba(0,0,0,0.4);
  --shadow2:0 4px 20px rgba(0,0,0,0.5);
  font-family:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.topbar{background:var(--bg3);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:var(--text)}
.logout-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .2s;font-size:20px}
.logout-btn:hover{color:var(--text);border-color:var(--text3)}
.main{padding:16px;max-width:900px;margin:0 auto}
.section-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;margin-top:20px}
.pedido-card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;transition:all .2s}
.pedido-card:hover{border-color:var(--gold);box-shadow:0 0 12px rgba(245,168,0,0.1)}
.pedido-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
.pedido-info h3{font-size:15px;font-weight:600;color:var(--text)}
.pedido-info p{font-size:13px;color:var(--text2);margin-top:4px}
.status-badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.status-pending{background:rgba(245,168,0,0.2);color:var(--gold)}
.status-approved{background:var(--green-bg);color:var(--green)}
.status-rejected{background:var(--red-bg);color:var(--red)}
.pedido-items{background:var(--bg3);border-radius:var(--r2);padding:12px;margin-bottom:12px}
.item-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.item-row:last-child{border-bottom:none}
.item-desc{flex:1}
.item-qty{color:var(--text2);width:60px;text-align:right}
.item-price{color:var(--gold);width:80px;text-align:right;font-weight:600}
.pedido-total{text-align:right;font-size:14px;font-weight:700;color:var(--gold);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.pedido-actions{display:flex;gap:8px;margin-top:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;flex:1;text-align:center}
.btn:active{transform:scale(.97)}
.btn-approve{background:var(--green);color:#fff}
.btn-approve:hover{background:#3d9b68}
.btn-reject{background:var(--red);color:#fff}
.btn-reject:hover{background:#c93030}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:24px;color:var(--text2)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--gold);display:block;margin-bottom:6px}
.stat-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg5);color:var(--text);padding:14px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999}
.toast.show{opacity:1}
.toast.success{background:rgba(76,175,125,0.2);color:var(--green)}
.toast.error{background:rgba(224,62,62,0.2);color:var(--red)}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr}.pedido-actions{flex-direction:column}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">🏆 Prime Sales Admin</div>
  <button class="logout-btn" onclick="window.fazerLogout()" title="Sair">🚪</button>
</div>

<div class="main" id="main">
  <div class="stats-grid" id="stats">
    <div class="stat-card">
      <span class="stat-val" id="stat-pending">0</span>
      <div class="stat-label">Pendentes</div>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="stat-approved">0</span>
      <div class="stat-label">Aprovados</div>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="stat-rejected">0</span>
      <div class="stat-label">Rejeitados</div>
    </div>
  </div>

  <div class="section-title">📋 Pedidos Pendentes de Aprovação</div>
  <div id="pedidos-container">
    <div class="loading">Carregando pedidos...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="firebase-config.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Aguarda a configuração Firebase ser carregada
async function aguardarConfig() {
  let tentativas = 0;
  while (!window.FIREBASE_CONFIG && tentativas < 50) {
    tentativas++;
    await new Promise(resolve => setTimeout(resolve, 100));
  }
  return window.FIREBASE_CONFIG;
}

const fbConfig = await aguardarConfig();

if (!fbConfig) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red;font-family:sans-serif;"><h2>❌ Erro de Configuração</h2><p>Falha ao carregar Firebase.</p></div>';
  throw new Error("Firebase config missing");
}

const fbApp = initializeApp(fbConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

const $ = id => document.getElementById(id);

let currentUser = null;
let pedidosUnsubscribe = null;
let statsUnsubscribe = null;

// Toast notifications
function mostrarNotificacao(msg, tipo = 'success') {
  const toast = $('toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.className = `toast show ${tipo}`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Formatar moeda
function formatarMoeda(valor) {
  return new Intl.NumberFormat('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  }).format(valor || 0);
}

// Formatar data
function formatarData(timestamp) {
  if (!timestamp) return 'N/A';
  const date = new Date(timestamp.seconds * 1000 || timestamp);
  return date.toLocaleDateString('pt-BR') + ' ' + date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

// Carregar pedidos pendentes em tempo real
function carregarPedidos() {
  const pedidosRef = collection(db, 'pedidos');
  const q = query(pedidosRef, where('status', '==', 'pendente'));

  if (pedidosUnsubscribe) pedidosUnsubscribe();

  pedidosUnsubscribe = onSnapshot(q, (snapshot) => {
    const container = $('pedidos-container');
    const pedidos = [];

    snapshot.forEach(doc => {
      pedidos.push({ id: doc.id, ...doc.data() });
    });

    if (pedidos.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><p>Nenhum pedido pendente!</p></div>';
      return;
    }

    // Ordenar por data mais recente
    pedidos.sort((a, b) => (b.criadoEm?.seconds || 0) - (a.criadoEm?.seconds || 0));

    container.innerHTML = pedidos.map(pedido => `
      <div class="pedido-card" data-id="${pedido.id}">
        <div class="pedido-header">
          <div class="pedido-info">
            <h3>Vendedor: ${pedido.vendedorNome || 'N/A'}</h3>
            <p>Cliente: ${pedido.clienteNome || 'N/A'}</p>
            <p>Data: ${formatarData(pedido.criadoEm)}</p>
          </div>
          <span class="status-badge status-pending">Pendente</span>
        </div>

        <div class="pedido-items">
          ${(pedido.itens || []).map(item => `
            <div class="item-row">
              <div class="item-desc">${item.nome} (${item.peca})</div>
              <div class="item-qty">${item.quantidade}x</div>
              <div class="item-price">${formatarMoeda(item.preco * item.quantidade)}</div>
            </div>
          `).join('')}
          <div class="pedido-total">Total: ${formatarMoeda(pedido.total)}</div>
        </div>

        <div class="pedido-actions">
          <button class="btn btn-approve" onclick="window.aprovarPedido('${pedido.id}')">✓ Aprovar</button>
          <button class="btn btn-reject" onclick="window.rejeitarPedido('${pedido.id}')">✕ Rejeitar</button>
        </div>
      </div>
    `).join('');

  }, (error) => {
    console.error('Erro ao carregar pedidos:', error);
    $('pedidos-container').innerHTML = '<div class="empty-state"><p>❌ Erro ao carregar pedidos</p></div>';
  });
}

// Carregar estatísticas
function carregarEstatisticas() {
  if (statsUnsubscribe) statsUnsubscribe();

  const pedidosRef = collection(db, 'pedidos');

  statsUnsubscribe = onSnapshot(pedidosRef, async (snapshot) => {
    let pending = 0, approved = 0, rejected = 0;

    snapshot.forEach(doc => {
      const status = doc.data().status;
      if (status === 'pendente') pending++;
      else if (status === 'aprovado') approved++;
      else if (status === 'rejeitado') rejected++;
    });

    $('stat-pending').textContent = pending;
    $('stat-approved').textContent = approved;
    $('stat-rejected').textContent = rejected;
  });
}

// Aprovar pedido
window.aprovarPedido = async function(pedidoId) {
  try {
    const pedidoRef = doc(db, 'pedidos', pedidoId);
    await updateDoc(pedidoRef, {
      status: 'aprovado',
      aprovadoEm: new Date(),
      aprovadoPor: currentUser?.email || 'admin'
    });
    mostrarNotificacao('✅ Pedido aprovado com sucesso!', 'success');
  } catch (e) {
    console.error('Erro ao aprovar:', e);
    mostrarNotificacao('❌ Erro ao aprovar pedido', 'error');
  }
};

// Rejeitar pedido
window.rejeitarPedido = async function(pedidoId) {
  try {
    const pedidoRef = doc(db, 'pedidos', pedidoId);
    await updateDoc(pedidoRef, {
      status: 'rejeitado',
      rejeitadoEm: new Date(),
      rejeitadoPor: currentUser?.email || 'admin'
    });
    mostrarNotificacao('✅ Pedido rejeitado', 'success');
  } catch (e) {
    console.error('Erro ao rejeitar:', e);
    mostrarNotificacao('❌ Erro ao rejeitar pedido', 'error');
  }
};

// Logout
window.fazerLogout = async function() {
  try {
    if (pedidosUnsubscribe) pedidosUnsubscribe();
    if (statsUnsubscribe) statsUnsubscribe();
    await signOut(auth);
  } catch(e) {
    console.error('Erro ao sair:', e);
  }
};

// Monitor de autenticação
onAuthStateChanged(auth, (user) => {
  if (!user) {
    // Redirecionar para login
    window.location.href = 'index.html';
    return;
  }

  currentUser = user;
  console.log('✅ Admin conectado:', user.email);
  carregarPedidos();
  carregarEstatisticas();
});
</script>
</body>
</html>
