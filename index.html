<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prime Sales">
  <meta name="description" content="Sistema de Gestão Comercial e Força de Vendas da Prime Representações.">
  <title>Prime Sales</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="public/icons/icon.svg">
  <link rel="icon" href="public/icons/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app/styles.css">
</head>
<body>
  <div id="splash" class="splash">
    <div class="brand-mark">⚙️</div>
    <h1>Prime Sales</h1>
    <p>Gestão Comercial e Força de Vendas</p>
    <div class="spinner" aria-label="Carregando"></div>
  </div>

  <main id="auth" class="auth hidden" aria-label="Login">
    <section class="auth-card">
      <div class="brand-mark large">⚙️</div>
      <h1>Prime Sales</h1>
      <p>Sistema de Gestão Comercial da Prime Representações</p>
      <div class="alert hidden" id="auth-error"></div>
      <label>E-mail<input id="login-email" type="email" autocomplete="email" placeholder="seu@email.com"></label>
      <label>Senha<input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••"></label>
      <button class="btn primary full" id="login-button">Entrar</button>
      <small>Primeiro acesso? Solicite seu login ao administrador.</small>
    </section>
  </main>

  <div id="app" class="app hidden">
    <header class="topbar">
      <button class="icon-btn ghost" id="menu-button" aria-label="Abrir menu">☰</button>
      <div class="topbar-title"><strong>Prime Sales</strong><span id="page-subtitle">Resumo</span></div>
      <div class="topbar-actions">
        <span class="role-pill" id="role-pill">...</span>
        <button class="icon-btn" id="install-button" title="Instalar app">⬇</button>
        <button class="icon-btn" id="logout-button" title="Sair">🚪</button>
      </div>
    </header>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand"><div class="brand-mark small">⚙️</div><div><strong>Prime Sales</strong><span id="user-name">Usuário</span></div></div>
      <nav id="main-nav" class="nav"></nav>
    </aside>
    <div id="sidebar-backdrop" class="backdrop hidden"></div>

    <section id="content" class="content"></section>
    <nav id="bottom-nav" class="bottom-nav"></nav>
  </div>

  <div id="toast" class="toast" role="status"></div>
  <script src="firebase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="app/app.js"></script>
</body>
</html>
