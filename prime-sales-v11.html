<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#F5A800;--gold-dark:#c98a00;--gold-light:rgba(245,168,0,0.12);
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;--bg5:#333;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --red:#e03e3e;--red-bg:rgba(224,62,62,0.12);
  --green:#4caf7d;--green-bg:rgba(76,175,125,0.12);
  --r:12px;--r2:8px;--r3:16px;
  --shadow:0 1px 3px rgba(0,0,0,0.4);
  --shadow2:0 4px 20px rgba(0,0,0,0.5);
  font-family:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:0;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.splash-icon{width:88px;height:88px;background:var(--gold);border-radius:24px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px rgba(245,168,0,0.35)}
.splash-title{font-size:24px;font-weight:700;letter-spacing:1px;color:var(--text)}
.splash-sub{font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.splash-tag{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic}
.splash-spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-top:32px}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
#auth{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--bg4);border:1px solid var(--border2);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:var(--shadow2)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo img{width:90px;height:90px;border-radius:16px;object-fit:cover;margin-bottom:12px}
.auth-logo h1{font-size:20px;font-weight:700;color:var(--text)}
.auth-logo p{font-size:12px;color:var(--text3);margin-top:3px}
.err{background:var(--red-bg);color:var(--red);border-radius:var(--r2);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}

/* FIELDS */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border2);border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,168,0,.12)}
.field textarea{resize:vertical;min-height:68px}
.field input[type=checkbox]{width:auto;padding:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--gold);color:#111}
.btn-primary:hover{background:var(--gold-dark)}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.btn-outline:hover{border-color:var(--text3);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-success{background:var(--green-bg);color:var(--green)}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;font-size:12px}

/* APP SHELL */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg3);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:32px;height:32px;border-radius:9px;overflow:hidden}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar-name{font-size:16px;font-weight:700;color:var(--text)}
.role-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.role-pill.admin{background:#1e2a3a;color:#7eb8f7}
.role-pill.vendedor{background:var(--gold-light);color:var(--gold)}
.logout-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.logout-btn:hover{color:var(--text);border-color:var(--text3)}
.logout-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg3);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;transition:color .15s;position:relative}
.nav-item.active{color:var(--gold)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-badge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:20px;display:none;align-items:center;justify-content:center}

/* MAIN */
.main{flex:1;padding:14px 14px 80px;max-width:600px;margin:0 auto;width:100%}
.page{display:none}
.page.active{display:block}

/* CARDS */
.card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.card-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:600}
.card-body{padding:14px 16px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 10px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat.gold{background:var(--gold);border-color:var(--gold)}
.stat.gold .stat-label{color:rgba(0,0,0,.6)}
.stat.gold .stat-val{color:#111}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.stat-val{font-size:26px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* ORDER CARDS */
.order-card{background:var(--bg4);border:1px solid var(--border);border-left:4px solid var(--border2);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-left-color .2s}
.order-card.pendente{border-left-color:var(--gold)}
.order-card.aprovado{border-left-color:var(--green)}
.order-card.rejeitado{border-left-color:var(--red)}
.order-head{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer}
.order-id{font-size:13px;font-weight:600;font-family:monospace;letter-spacing:.05em}
.order-meta{font-size:11px;color:var(--text3);margin-top:2px}
.order-body{padding:0 14px 14px;display:none}
.order-body.open{display:block}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.badge.pendente{background:rgba(245,168,0,.15);color:var(--gold)}
.badge.aprovado{background:var(--green-bg);color:var(--green)}
.badge.rejeitado{background:var(--red-bg);color:var(--red)}

/* PRODUCT LIST */
.prod-item{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);gap:10px}
.prod-item:last-child{border-bottom:none}
.prod-name{font-size:13px;font-weight:500;line-height:1.4}
.prod-ref{font-size:11px;color:var(--gold);font-weight:600;margin-top:1px}
.prod-meta{font-size:11px;color:var(--text3);margin-top:2px}
.prod-price{font-size:13px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;white-space:nowrap}

/* EMPTY */
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty svg{width:44px;height:44px;stroke:var(--border2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg5);color:var(--text);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:300;box-shadow:var(--shadow2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:600px){.main{padding:20px 24px 80px}.stats-grid{grid-template-columns:repeat(4,1fr)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4M9 2v4m6-4v4"/></svg>
  </div>
  <div class="splash-title">PRIME SALES</div>
  <div class="splash-sub">Representações</div>
  <div class="splash-tag">Peças de Qualidade. Parceria que Move.</div>
  <div class="splash-spinner"></div>
</div>

<!-- AUTH -->
<div id="auth" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="width:80px;height:80px;background:var(--gold);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4M9 2v4m6-4v4"/></svg>
      </div>
      <h1>Prime Sales</h1>
      <p>Sistema de pedidos</p>
    </div>
    <div class="err" id="auth-err"></div>
    <div class="field"><label>E-mail</label><input type="email" id="inp-email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input type="password" id="inp-senha" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary btn-full" id="btn-login" onclick="fazerLogin()" style="margin-top:4px;">Entrar</button>
    <p style="font-size:12px;color:var(--text3);text-align:center;margin-top:14px;">Primeiro acesso? Peça seu login ao administrador.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div style="width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4M9 2v4m6-4v4"/></svg>
      </div>
      <span class="topbar-name">Prime Sales</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="role-pill" id="role-pill">Admin</span>
      <button class="logout-btn" onclick="fazerLogout()" title="Sair">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </div>

  <div class="main" id="main">

    <!-- ADMIN: RESUMO -->
    <div class="page active" id="page-resumo">
      <div class="stats-grid">
        <div class="stat gold" onclick="goAdmin('pedidos')" style="cursor:pointer">
          <div class="stat-label">Pendentes</div>
          <div class="stat-val" id="st-pend">0</div>
        </div>
        <div class="stat" onclick="goAdmin('pedidos')" style="cursor:pointer">
          <div class="stat-label">Aprovados</div>
          <div class="stat-val" id="st-aprov">0</div>
        </div>
        <div class="stat" onclick="goAdmin('produtos')" style="cursor:pointer">
          <div class="stat-label">Produtos</div>
          <div class="stat-val" id="st-prod">0</div>
        </div>
        <div class="stat" onclick="goAdmin('vendedores')" style="cursor:pointer">
          <div class="stat-label">Vendedores</div>
          <div class="stat-val" id="st-vend">0</div>
        </div>
      </div>

      <div class="section-title">Pedidos aguardando aprovação</div>
      <div id="resumo-list"></div>
    </div>

    <!-- ADMIN: PEDIDOS (TODOS - PENDENTES E APROVADOS) -->
    <div class="page" id="page-pedidos">
      <div id="pedidos-list"></div>
    </div>

    <!-- VENDEDOR: MEUS PEDIDOS -->
    <div class="page" id="page-meus">
      <div id="meus-list"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="goPage('resumo','nav',0)">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="goAdmin('pedidos');goPage('pedidos','nav',1)">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      <span>Pedidos</span>
      <div class="nav-badge" id="badge-pedidos"></div>
    </div>
    <div class="nav-item" onclick="goPage('meus','nav',2)">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 7a4 4 0 100-8 4 4 0 000 8z"/></svg>
      <span>Meus pedidos</span>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="firebase-config.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc, serverTimestamp, orderBy, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function aguardarConfig() {
  let tentativas = 0;
  while (!window.FIREBASE_CONFIG && tentativas < 50) {
    tentativas++;
    await new Promise(resolve => setTimeout(resolve, 100));
  }
  return window.FIREBASE_CONFIG;
}

const fbConfig = await aguardarConfig();
if (!fbConfig) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red;"><h2>❌ Erro</h2><p>Firebase config não encontrado.</p></div>';
  throw new Error("Firebase config missing");
}

const app = initializeApp(fbConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
let me = null;
let isAdmin = false;
let pedidosCache = [];
let produtos = [];
let vendedores = {};
let unsubs = [];

// ─── AUTENTICAÇÃO ─────────────────────────
function fazerLogin() {
  const email = $('inp-email').value.trim();
  const senha = $('inp-senha').value.trim();
  if (!email || !senha) { toast('Preencha email e senha'); return; }
  
  signInWithEmailAndPassword(auth, email, senha).catch(e => {
    $('auth-err').textContent = e.message;
    $('auth-err').style.display = 'block';
  });
}

window.fazerLogout = function() {
  signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  const splash = $('splash');
  const authDiv = $('auth');
  const appDiv = $('app');

  if (!user) {
    me = null;
    isAdmin = false;
    splash.classList.add('hide');
    authDiv.style.display = 'flex';
    appDiv.style.display = 'none';
    unsubs.forEach(u => u());
    unsubs = [];
    return;
  }

  me = user;
  
  // Verifica se é admin
  const userDoc = await getDocs(query(collection(db, 'usuarios'), where('uid', '==', user.uid)));
  if (userDoc.docs.length > 0) {
    isAdmin = userDoc.docs[0].data().isAdmin || false;
  }

  // Mostra a interface
  splash.classList.add('hide');
  authDiv.style.display = 'none';
  appDiv.style.display = 'flex';
  
  $('role-pill').textContent = isAdmin ? '👨‍💼 ADMIN' : '👤 VENDEDOR';
  
  // Carrega dados
  carregarPedidos();
  carregarProdutos();
  if (isAdmin) carregarVendedores();
});

// ─── PEDIDOS ──────────────────────────────
function carregarPedidos() {
  const unsub = onSnapshot(
    query(collection(db, 'pedidos'), orderBy('criadoEm', 'desc')),
    (snap) => {
      pedidosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      // Atualiza stats
      const pendentes = pedidosCache.filter(p => p.status === 'pendente').length;
      const aprovados = pedidosCache.filter(p => p.status === 'aprovado').length;
      $('st-pend').textContent = pendentes;
      $('st-aprov').textContent = aprovados;
      $('badge-pedidos').textContent = pendentes;
      $('badge-pedidos').style.display = pendentes > 0 ? 'flex' : 'none';
      
      // Renderiza resumo e lista
      renderResumoPedidos();
      renderTodosPedidos();
      renderMeusPedidos();
    }
  );
  unsubs.push(unsub);
}

function renderResumoPedidos() {
  const pendentes = pedidosCache.filter(p => p.status === 'pendente');
  const el = $('resumo-list');
  if (pendentes.length === 0) {
    el.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Nenhum pedido pendente</p></div>';
    return;
  }
  el.innerHTML = pendentes.slice(0, 3).map(renderOrderCard).join('');
}

function renderTodosPedidos() {
  const el = $('pedidos-list');
  if (pedidosCache.length === 0) {
    el.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Nenhum pedido</p></div>';
    return;
  }
  
  // Mostra PENDENTES primeiro, depois APROVADOS
  const pendentes = pedidosCache.filter(p => p.status === 'pendente');
  const aprovados = pedidosCache.filter(p => p.status === 'aprovado');
  const rejeitados = pedidosCache.filter(p => p.status === 'rejeitado');
  
  let html = '';
  if (pendentes.length > 0) {
    html += '<div class="section-title">⏳ Aguardando Aprovação</div>';
    html += pendentes.map(renderOrderCard).join('');
  }
  if (aprovados.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">✅ Aprovados</div>';
    html += aprovados.map(renderOrderCard).join('');
  }
  if (rejeitados.length > 0) {
    html += '<div class="section-title" style="margin-top:20px">❌ Rejeitados</div>';
    html += rejeitados.map(renderOrderCard).join('');
  }
  
  el.innerHTML = html;
}

function renderMeusPedidos() {
  if (!me) return;
  const meus = pedidosCache.filter(p => p.vendedorId === me.uid);
  const el = $('meus-list');
  if (meus.length === 0) {
    el.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>Você não fez nenhum pedido ainda</p></div>';
    return;
  }
  el.innerHTML = meus.map(renderOrderCard).join('');
}

function renderOrderCard(p) {
  const fmt = v => 'R$ ' + (v||0).toFixed(2).replace('.', ',');
  const vend = vendedores[p.vendedorId] || { nome: 'Vendedor' };
  const hora = p.criadoEm ? new Date(p.criadoEm.seconds * 1000).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
  
  const acoes = isAdmin && p.status === 'pendente' ? `
    <button class="btn btn-primary btn-sm" onclick="aprovar('${p.id}')" style="margin-right:8px;">✓ Aprovar</button>
    <button class="btn btn-danger btn-sm" onclick="rejeitar('${p.id}')">✕ Rejeitar</button>
  ` : '';
  
  const detalhes = p.itens ? p.itens.map(i => `
    <div class="prod-item">
      <div>
        <div class="prod-name">${i.nome}</div>
        <div class="prod-ref">${i.ref || 'S/Ref'}</div>
        <div class="prod-meta">${i.qty}x @ ${fmt(i.preco)}</div>
      </div>
      <div class="prod-price">${fmt(i.preco * i.qty)}</div>
    </div>
  `).join('') : '';
  
  return `<div class="order-card ${p.status}" id="ob-${p.id}">
    <div class="order-head" onclick="toggleOrder('${p.id}')">
      <div>
        <div class="order-id">#${(p.id||'').slice(-6).toUpperCase()}</div>
        <div class="order-meta">${hora} • ${vend.nome}</div>
      </div>
      <span class="badge ${p.status}">${p.status}</span>
    </div>
    <div class="order-body">
      <div style="padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">Cliente</div>
        <div style="font-size:13px;font-weight:500;">${p.cliente?.nome || 'N/A'}</div>
        <div style="font-size:11px;color:var(--text3);">${p.cliente?.doc || ''}</div>
      </div>
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        ${detalhes}
      </div>
      <div style="padding:10px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:13px;color:var(--text3);">Total</span>
        <span style="font-size:16px;font-weight:700;color:var(--gold);">${fmt(p.total||0)}</span>
      </div>
      ${acoes}
    </div>
  </div>`;
}

window.toggleOrder = function(id) {
  const el = $('ob-'+id);
  if(el) el.querySelector('.order-body')?.classList.toggle('open');
};

window.aprovar = async function(id) {
  const p = pedidosCache.find(x => x.id === id);
  if(!p) return;
  try {
    await updateDoc(doc(db, 'pedidos', id), { status: 'aprovado', aprovadoEm: serverTimestamp() });
    // Desconta estoque
    if (p.itens) {
      for (const item of p.itens) {
        const prod = produtos.find(x => x.id === item.prodId);
        if (prod) {
          const novo = Math.max(0, prod.estoque - item.qty);
          await updateDoc(doc(db, 'produtos', item.prodId), { estoque: novo });
        }
      }
    }
    toast('✅ Pedido aprovado!');
  } catch(e) { toast('Erro ao aprovar'); }
};

window.rejeitar = async function(id) {
  try {
    await updateDoc(doc(db, 'pedidos', id), { status: 'rejeitado' });
    toast('❌ Pedido rejeitado');
  } catch(e) { toast('Erro ao rejeitar'); }
};

// ─── PRODUTOS ─────────────────────────────
function carregarProdutos() {
  const unsub = onSnapshot(collection(db, 'produtos'), (snap) => {
    produtos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    $('st-prod').textContent = produtos.length;
  });
  unsubs.push(unsub);
}

// ─── VENDEDORES ───────────────────────────
function carregarVendedores() {
  const unsub = onSnapshot(collection(db, 'usuarios'), (snap) => {
    vendedores = {};
    snap.docs.forEach(d => {
      if (!d.data().isAdmin) {
        vendedores[d.data().uid] = { nome: d.data().nome, email: d.id };
      }
    });
    $('st-vend').textContent = Object.keys(vendedores).length;
  });
  unsubs.push(unsub);
}

// ─── NAVEGAÇÃO ────────────────────────────
window.goPage = function(page, group, idx) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll(`.nav-item`).forEach((n, i) => {
    if (group === 'nav' && i === idx) n.classList.add('active');
    else if (group !== 'nav') n.classList.remove('active');
  });
  $('page-' + page).classList.add('active');
};

window.goAdmin = function(page) {
  goPage(page, 'admin');
};

// ─── TOAST ────────────────────────────────
window.toast = function(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

</script>

</body>
</html>
